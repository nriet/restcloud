# ============================================================================
# Docker Image CI - Publish RestCloud Docker images
#
# 触发条件:
#   - master 分支 push 时构建并推送镜像
#   - tag 推送时同时构建并推送镜像
#
# 构建策略:
#   1. Dockerfile        → nriet/restcloud:latest, :<version>
#   2. Dockerfile-slim-buster → nriet/restcloud:<version>-slim-buster
#   3. Dockerfile-slim-buster-python3 → nriet/restcloud:<version>-slim-buster-python3
#   4. Dockerfile-python3 → nriet/restcloud:<version>-python3
# ============================================================================

name: Publish Docker Image

env:
  APP_NAME: restcloud
  DOCKERHUB_REPO: nriet/restcloud

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate App Version
        id: version
        run: |
          # 如果是 tag 触发，使用 tag 名；否则使用 git describe
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(git describe --tags --always 2>/dev/null || echo 'dev')"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ================================================================
      # 1. RestCloud (no Python) - 全量 JDK 8 (amd64)
      # ================================================================
      - name: Build & Push (full-jdk8)
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ================================================================
      # 2. RestCloud (no Python) - slim-buster (amd64)
      # ================================================================
      - name: Build & Push (slim-buster)
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile-slim-buster
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}-slim-buster
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ================================================================
      # 3. RestCloud (with Python3) - slim-buster (amd64)
      # ================================================================
      - name: Build & Push (slim-buster-python3)
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile-slim-buster-python3
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}-slim-buster-python3
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ================================================================
      # 4. RestCloud (compiled Python3) - 全量 JDK 8 + Python 源码编译 (amd64)
      # ================================================================
      - name: Build & Push (full-jdk8-python3)
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile-python3
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}-python3
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
