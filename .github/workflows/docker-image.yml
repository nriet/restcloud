# ============================================================================
# Docker Image CI - Publish RestCloud Docker images
#
# 触发条件:
#   - master 分支 push 时构建并推送镜像
#   - tag 推送时同时构建并推送镜像
#
# 构建策略:
#   1. Dockerfile        → nriet/restcloud:<RESTCLOUD_VERSION>
#   2. Dockerfile-slim-buster → nriet/restcloud:<RESTCLOUD_VERSION>-slim-buster
#   3. Dockerfile-slim-buster-python3 → nriet/restcloud:<RESTCLOUD_VERSION>-slim-buster-python3
#   4. Dockerfile-python3 → nriet/restcloud:<RESTCLOUD_VERSION>-python3
# ============================================================================

name: Publish Docker Image

env:
  APP_NAME: restcloud
  DOCKERHUB_REPO: nriet/restcloud

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect RESTCLOUD_VERSION
        id: version
        run: |
          # 优先使用 git tag（推送 tag 时）
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"  # 去掉 v 前缀（v4.2 -> 4.2）
          else
            # 从 Dockerfile 读取 RESTCLOUD_VERSION 作为版本号
            VERSION=$(grep -m1 '^ARG RESTCLOUD_VERSION=' Dockerfile | sed 's/^.*=//')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected RESTCloud version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ================================================================
      # 1. RestCloud (no Python) - 全量 JDK 8 (amd64)
      # ================================================================
      - name: Build & Push (full-jdk8)
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ================================================================
      # 2. RestCloud (no Python) - slim-buster (amd64)
      # ================================================================
      - name: Build & Push (slim-buster)
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile-slim-buster
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}-slim-buster
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ================================================================
      # 3. RestCloud (with Python3) - slim-buster (amd64)
      # ================================================================
      - name: Build & Push (slim-buster-python3)
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile-slim-buster-python3
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}-slim-buster-python3
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ================================================================
      # 4. RestCloud (compiled Python3) - 全量 JDK 8 + Python 源码编译 (amd64)
      # ================================================================
      - name: Build & Push (full-jdk8-python3)
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile-python3
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.version.outputs.version }}-python3
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
